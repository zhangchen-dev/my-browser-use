[project]
name = "my-browser-use"
version = "0.1.0"
description = ""
authors = [
    {name = "zhangjiaqi",email = "zhang.jia.qi.study@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
    "browser-use (>=0.12.5,<0.13.0)"
]

# 使用src布局的正确配置
[[tool.poetry.packages]]
include = "src"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)",
    "black (>=26.3.1,<27.0.0)",
    "flake8 (>=7.3.0,<8.0.0)"
]